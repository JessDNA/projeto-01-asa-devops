---
- name: Configuração do Host Cliente (cli)
  hosts: cli
  become: yes
  
  handlers:
    - name: restart ssh
      service:
        name: ssh
        state: restarted
  
  tasks:
    - name: Instalar Firefox ESR
      apt:
        name: firefox-esr
        update_cache: yes
        state: present
    
    - name: Instalar xauth para X11 Forwarding
      apt:
        name: xauth
        update_cache: yes
        state: present
    
    - name: Habilitar X11 Forwarding no SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^X11Forwarding"
        line: "X11Forwarding yes"
        state: present
      notify: restart ssh
    
    - name: Desabilitar X11DisplayOffset
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^X11UseLocalhost"
        line: "X11UseLocalhost no"
        state: present
      notify: restart ssh
    
    - name: Instalar NFS Client
      apt:
        name: nfs-common
        update_cache: yes
        state: present
    
    - name: Instalar autofs
      apt:
        name: autofs
        update_cache: yes
        state: present
    
    - name: Criar ponto de montagem /var/nfs
      file:
        path: /var/nfs
        state: directory
        mode: '0755'
    
    - name: Configurar autofs para /var/nfs
      lineinfile:
        path: /etc/auto.master
        line: "/var/nfs /etc/auto.nfs --browse,--timeout=60"
        state: present
    
    - name: Criar mapa automático de montagem
      copy:
        content: "nfs -rw,hard,intr,nosuid 192.168.56.109:/dados/nfs\n"
        dest: /etc/auto.nfs
        mode: '0644'
    
    - name: Iniciar serviço autofs
      service:
        name: autofs
        state: started
        enabled: yes
    
    - name: Adicionar entrada em /etc/fstab
      lineinfile:
        path: /etc/fstab
        line: "192.168.56.109:/dados/nfs /var/nfs nfs defaults 0 0"
        state: present
