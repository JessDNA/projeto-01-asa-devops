---
- name: Configuração do Servidor de Arquivos (arq)
  hosts: arq
  become: yes
  
  handlers:
    - name: reload nfs
      service:
        name: nfs-kernel-server
        state: reloaded
    
    - name: restart dhcp
      service:
        name: isc-dhcp-server
        state: restarted
    
    - name: restart bind
      service:
        name: bind9
        state: restarted
  
  tasks:
    # LVM Setup
    - name: Instalar pacote LVM2
      apt:
        name: lvm2
        update_cache: yes
        state: present
    - name: Criar Volume Group dados
      lvg:
        vg: dados
        pvs: /dev/sdb,/dev/sdc,/dev/sdd
    
    - name: Criar Logical Volume ifpb
      lvol:
        vg: dados
        lv: ifpb
        size: 15G
    
    - name: Formatar LV com ext4
      filesystem:
        fstype: ext4
        dev: /dev/dados/ifpb
    
    - name: Montar volume em /dados
      mount:
        path: /dados
        src: /dev/dados/ifpb
        fstype: ext4
        state: mounted
    
    # NFS Setup
    - name: Instalar nfs-kernel-server
      apt:
        name: nfs-kernel-server
        update_cache: yes
        state: present
          
    - name: Criar usuário nfs-ifpb
      user:
        name: nfs-ifpb
        uid: 2000
        group: nogroup
        shell: /usr/sbin/nologin
        state: present
    
    - name: Criar diretório /dados/nfs
      file:
        path: /dados/nfs
        state: directory
        owner: nfs-ifpb
        group: nogroup
        mode: '0755'  
    
    - name: Configurar exports NFS
      lineinfile:
        path: /etc/exports
        line: "/dados/nfs 192.168.56.0/24(rw,sync,all_squash,anonuid=2000,anongid=65534)"
        state: present
      notify: reload nfs    
    
    - name: Iniciar serviço NFS
      service:
        name: nfs-kernel-server
        state: started
        enabled: yes
    
    # DHCP Server Setup
    - name: Instalar isc-dhcp-server
      apt:
        name: isc-dhcp-server
        update_cache: yes
        state: present
    
    - name: Copiar configuração DHCP
      copy:
        src: dhcpd.conf
        dest: /etc/dhcp/dhcpd.conf
        mode: '0644'
      notify: restart dhcp
    
    - name: Configurar interface DHCP
      lineinfile:
        path: /etc/default/isc-dhcp-server
        regexp: "^INTERFACESv4"
        line: 'INTERFACESv4="eth1"'
        state: present
      notify: restart dhcp
    
    - name: Iniciar serviço DHCP
      service:
        name: isc-dhcp-server
        state: started
        enabled: yes
    
    # DNS Server Setup (Bind9)
    - name: Instalar bind9 e bind9utils
      apt:
        name:
          - bind9
          - bind9utils
        update_cache: yes
        state: present
    
    - name: Copiar configuração named.conf.options
      copy:
        src: named.conf.options
        dest: /etc/bind/named.conf.options
        mode: '0644'
      notify: restart bind
    
    - name: Copiar configuração named.conf.internal-zones
      copy:
        src: named.conf.internal-zones
        dest: /etc/bind/named.conf.internal-zones
        mode: '0644'
      notify: restart bind
    
    - name: Copiar zona direta DNS
      copy:
        src: jesse.joao.devops.db
        dest: /etc/bind/jesse.joao.devops.db
        mode: '0644'
      notify: restart bind
    
    - name: Copiar zona reversa DNS
      copy:
        src: 56.168.192.db
        dest: /etc/bind/56.168.192.db
        mode: '0644'
      notify: restart bind
    
    - name: Incluir zonas internas no named.conf
      lineinfile:
        path: /etc/bind/named.conf
        line: 'include "/etc/bind/named.conf.internal-zones";'
        state: present
      notify: restart bind
    
    - name: Iniciar serviço Bind9
      service:
        name: bind9
        state: started
        enabled: yes
